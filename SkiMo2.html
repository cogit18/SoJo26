<!DOCTYPE html>
<html>
<head>
    <title>SoJo26 | Ski Mountaineering</title>
    <link rel="icon" href="images/favicon.svg?v1" type="image/x-icon" />
    <link rel="stylesheet" href="SkiMo2.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
</head>
<body>
    <div class="content">
        <img class="center" src="images/Olympic_Rings.svg">
        <h1>Ski Mountaineering</h1>
        
        <div class="timer-section">
            <span id="hint-wrapper">Hint: <span id="hint-timer">03:00</span></span>
            <span id="validation-container">Next Hint: <span id="validation-timer">03:00</span></span>
        </div>
        
        <p>Way to go on acing your Olympics trivia! Now it's time to make your way to the Ski Mountaineering event.</p>
        <p>/// (5 letters: Fruity bread spread) <br/>
           . (5 letters: Decade fractions) <br/>
           . (5 letters: Poker tokens)</p>
           
        <table id="targetTable" width="100%">
          <tr>
            <td class="entry">///</td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
          </tr>
          <tr>
            <td class="entry">.</td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
          </tr>
          <tr>
            <td class="entry">.</td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
            <td class="entry"><input type='text' maxlength="1" class="char-input"></td>
          </tr>
        </table>

        <div class="bottom-section">
            <p id="gps-status">Waiting for GPS permission...</p>
            
            <button id="qaCheckBtn">QA Check</button>

            <div class="button-container">
                <button id="viewCongratsBtn" class="action-btn">View Congrats</button>
                <button id="viewLocationBtn" class="action-btn">Target Reached!</button>
            </div>
        </div>

        <div id="congratsModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeCongrats">&times;</span>
                <span id="congratsContent"></span>
            </div>
        </div>
        
        <div id="hintModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeHint">&times;</span>
                <span id="hintContent"></span>
            </div>
        </div>

        <div id="locationModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeLocation">&times;</span>
                <div id="locationContent">
                    </div>
            </div>
        </div>

        <div class="wrapper">
            <div class="row">
                <div class="icon"><img src="images/SkiMountaineering.svg"></div>
                <div class="icon"><img class="trans" src="images/ShortTrackSpeedSkating.svg"></div>
                <div class="icon"><img class="trans" src="images/Snowboard.svg"></div>
                <div class="icon"><img class="trans" src="images/Skeleton.svg"></div>
                <div class="icon"><img class="trans" src="images/Curling.svg"></div>
                <div class="icon"><img class="trans" src="images/Biathlon.svg"></div>
                <div class="icon"><img class="trans" src="images/FreestyleSkiing.svg"></div>
            </div>
        </div>
    </div>
    <script src="SkiMo2.js"></script>
</body>
</html>
